<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="bloco">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>bloco</title>
<style>
*, *:before, *:after {
  -webkit-box-sizing: border-box;
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  height: 100%;
  background: #b2c9c3;
  color: #0d0d0d;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 17px;
  line-height: 1.6;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  padding: 22px 14px 10px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
}
.header-left {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: baseline;
  align-items: baseline;
}
.header-title {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.8px;
  line-height: 1;
  margin-right: 10px;
}
.header-count {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #4a5e58;
}
.header-actions {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
}
.header-actions > * + * { margin-left: 6px; }

.kb-badge {
  display: none;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  background: rgba(0,0,0,0.12);
  border-radius: 20px;
  padding: 4px 10px;
  color: #0d0d0d;
}
.kb-badge.on { display: inline-block; }

.hbtn {
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(0,0,0,0.12);
  border: none;
  border-radius: 20px;
  padding: 6px 12px;
  color: #0d0d0d;
  cursor: pointer;
}
.hbtn:active { opacity: 0.7; }
.hbtn.dark {
  background: #0d0d0d;
  color: #f0ece4;
}

/* ── Bento — row-based ── */
.bento {
  padding: 4px 14px 130px;
}
.bento-row {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: row;
  flex-direction: row;
  margin-bottom: 8px;
}
.bento-row > * + * { margin-left: 8px; }

/* Card base */
.note-card {
  -webkit-flex: 1;
  flex: 1;
  background: #f0ece4;
  border-radius: 14px;
  padding: 14px 14px 11px;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  overflow: hidden;
  min-height: 90px;
  -webkit-transition: -webkit-transform 0.14s;
  transition: transform 0.14s;
  position: relative;
}
.note-card:active {
  -webkit-transform: scale(0.97);
  transform: scale(0.97);
}

/* Wide card: full row, taller */
.note-card.wide {
  min-height: 110px;
}

.note-card-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  font-weight: 700;
  color: #0d0d0d;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-card-preview {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  color: #777;
  line-height: 1.5;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
.note-card-date {
  font-family: 'Courier New', Courier, monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #bbb;
  margin-top: 8px;
}

/* ── Empty ── */
.empty {
  text-align: center;
  padding: 80px 32px;
}
.empty-icon { font-size: 42px; margin-bottom: 14px; opacity: 0.3; }
.empty-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #555;
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 28px; right: 18px;
  width: 54px; height: 54px;
  border-radius: 50%;
  background: #0d0d0d;
  color: #fff;
  border: none;
  font-size: 28px;
  line-height: 54px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(0,0,0,0.28);
  z-index: 50;
  -webkit-transition: -webkit-transform 0.12s;
  transition: transform 0.12s;
}
.fab:active { -webkit-transform: scale(0.90); transform: scale(0.90); }

/* ── Editor ── */
.editor-screen {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #f0ece4;
  z-index: 100;
  -webkit-flex-direction: column;
  flex-direction: column;
}
.editor-screen.open { display: -webkit-flex; display: flex; }

.editor-bar {
  background: #f0ece4;
  border-bottom: 1px solid rgba(0,0,0,0.09);
  padding: 12px 14px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.ebtn {
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: none;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  padding: 7px 13px;
  cursor: pointer;
  color: #0d0d0d;
}
.ebtn:active { opacity: 0.6; }
.ebtn.del { color: #c0392b; border-color: rgba(192,57,43,0.28); display: none; }
.ebtn.del.on { display: block; }
.ebtn.save { background: #0d0d0d; color: #fff; border-color: #0d0d0d; }

.editor-bar-right {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
}
.editor-bar-right > * + * { margin-left: 8px; }

.saved-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #5a9e50;
  opacity: 0;
  display: inline-block;
  -webkit-transition: opacity 0.3s;
  transition: opacity 0.3s;
}
.saved-dot.on { opacity: 1; }

.editor-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 22px;
  font-weight: 700;
  color: #0d0d0d;
  border: none; outline: none;
  background: transparent;
  padding: 16px 18px 8px;
  width: 100%;
  -webkit-flex-shrink: 0; flex-shrink: 0;
  letter-spacing: -0.3px;
  -webkit-appearance: none;
  border-radius: 0;
}
.editor-title::-webkit-input-placeholder { color: #ccc; font-weight: 400; }

.editor-body {
  font-family: 'Courier New', Courier, monospace;
  font-size: 15px;
  color: #0d0d0d;
  border: none; outline: none;
  background: transparent;
  padding: 8px 18px 40px;
  width: 100%;
  -webkit-flex: 1; flex: 1;
  resize: none;
  line-height: 1.8;
  -webkit-overflow-scrolling: touch;
  overflow-y: auto;
  -webkit-appearance: none;
  border-radius: 0;
}
.editor-body::-webkit-input-placeholder { color: #ccc; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 90px; left: 50%;
  -webkit-transform: translateX(-50%) translateY(18px);
  transform: translateX(-50%) translateY(18px);
  background: #0d0d0d;
  color: #fff;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 40px;
  opacity: 0;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
  -webkit-transition: opacity 0.2s, -webkit-transform 0.2s;
  transition: opacity 0.2s, transform 0.2s;
}
.toast.on {
  opacity: 1;
  -webkit-transform: translateX(-50%) translateY(0);
  transform: translateX(-50%) translateY(0);
}

/* ── Sheet (delete confirm + snapshot menu) ── */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.42);
  z-index: 200;
  -webkit-align-items: flex-end; align-items: flex-end;
  -webkit-justify-content: center; justify-content: center;
}
.overlay.on { display: -webkit-flex; display: flex; }
.sheet {
  background: #f0ece4;
  border-radius: 18px 18px 0 0;
  padding: 22px 18px 40px;
  width: 100%;
}
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.sheet-sub {
  font-family: 'Courier New', monospace;
  font-size: 11px; color: #888;
  letter-spacing: 0.06em;
  margin-bottom: 20px;
}
.sheet-btns {
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
}
.sheet-btns > * + * { margin-top: 10px; }
.sbtn {
  border-radius: 11px; padding: 14px;
  font-family: 'Courier New', monospace;
  font-size: 12px; letter-spacing: 0.12em;
  text-transform: uppercase; cursor: pointer;
  border: none;
}
.sbtn:active { opacity: 0.75; }
.sbtn.primary { background: #0d0d0d; color: #fff; }
.sbtn.danger   { background: #c0392b; color: #fff; }
.sbtn.ghost    { background: none; border: 1px solid rgba(0,0,0,0.14); color: #0d0d0d; }

/* ── Restore textarea (inside sheet) ── */
.restore-area {
  display: none;
  margin-top: 12px;
}
.restore-area.on { display: block; }
.restore-ta {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  padding: 10px;
  width: 100%;
  height: 140px;
  resize: none;
  -webkit-overflow-scrolling: touch;
  background: #fff;
  margin-bottom: 10px;
  line-height: 1.5;
}
</style>
</head>
<body>

<!-- LIST -->
<div id="list-screen">
  <div class="header">
    <div class="header-left">
      <div class="header-title">bloco</div>
      <div class="header-count" id="note-count">0 notas</div>
    </div>
    <div class="header-actions">
      <div class="kb-badge" id="kb-badge">⌨ físico</div>
      <button class="hbtn dark" onclick="openSnapshot()">⊛ snapshot</button>
    </div>
  </div>
  <div class="bento" id="bento"></div>
  <button class="fab" onclick="newNote()">+</button>
</div>

<!-- EDITOR -->
<div class="editor-screen" id="editor">
  <div class="editor-bar">
    <button class="ebtn" onclick="closeEditor()">← voltar</button>
    <div class="editor-bar-right">
      <span class="saved-dot" id="saved-dot"></span>
      <button class="ebtn del" id="btn-del" onclick="openDelete()">apagar</button>
      <button class="ebtn save" onclick="saveNote()">salvar</button>
    </div>
  </div>
  <input  class="editor-title" id="ed-title" type="text"
    placeholder="Título" autocomplete="off"
    autocorrect="on" autocapitalize="sentences">
  <textarea class="editor-body" id="ed-body"
    placeholder="Escreva aqui..."
    autocorrect="on" autocapitalize="sentences"></textarea>
</div>

<!-- DELETE SHEET -->
<div class="overlay" id="del-overlay" onclick="closeDelete()">
  <div class="sheet" onclick="stopProp(event)">
    <div class="sheet-title">Apagar nota?</div>
    <div class="sheet-sub">Não pode ser desfeito.</div>
    <div class="sheet-btns">
      <button class="sbtn danger" onclick="doDelete()">Apagar</button>
      <button class="sbtn ghost"  onclick="closeDelete()">Cancelar</button>
    </div>
  </div>
</div>

<!-- SNAPSHOT SHEET -->
<div class="overlay" id="snap-overlay" onclick="closeSnapshot()">
  <div class="sheet" onclick="stopProp(event)">
    <div class="sheet-title">Snapshot</div>
    <div class="sheet-sub" id="snap-sub">fotografia completa do bloco</div>
    <div class="sheet-btns">
      <button class="sbtn primary" onclick="doSave()">↓ salvar snapshot</button>
      <button class="sbtn ghost"   onclick="toggleRestoreArea()">↑ restaurar snapshot</button>
      <button class="sbtn ghost"   onclick="closeSnapshot()">Cancelar</button>
    </div>
    <!-- restore area: paste JSON or pick file -->
    <div class="restore-area" id="restore-area">
      <textarea class="restore-ta" id="restore-ta"
        placeholder='Cole o JSON aqui, ou escolha o arquivo abaixo...'></textarea>
      <input type="file" id="restore-file" accept=".json,.txt,.md"
        style="display:none" onchange="readFile(event)">
      <div class="sheet-btns">
        <button class="sbtn ghost" onclick="pickFile()">Escolher arquivo</button>
        <button class="sbtn primary" onclick="doRestore()">Restaurar agora</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════════
var KEY_A = 'bloco_v2_a';
var KEY_B = 'bloco_v2_b';

function lsOk() {
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }
  catch(e) { return false; }
}
var LS = lsOk();

function loadNotes() {
  if (!LS) return [];
  try {
    var r = localStorage.getItem(KEY_A) || localStorage.getItem(KEY_B);
    if (!r) return [];
    var p = JSON.parse(r);
    return Array.isArray(p) ? p : [];
  } catch(e) {
    try {
      var r2 = localStorage.getItem(KEY_B);
      var p2 = JSON.parse(r2 || '[]');
      return Array.isArray(p2) ? p2 : [];
    } catch(e2) { return []; }
  }
}

function persist() {
  if (!LS) return false;
  try {
    var j = JSON.stringify(notes);
    localStorage.setItem(KEY_A, j);
    try { localStorage.setItem(KEY_B, j); } catch(e) {}
    return true;
  } catch(e) {
    try { localStorage.removeItem(KEY_B); localStorage.setItem(KEY_A, JSON.stringify(notes)); return true; }
    catch(e2) { toast('Armazenamento cheio — faça um snapshot'); return false; }
  }
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
var notes = loadNotes();
var curId = null;
var asTimer = null;

// ══════════════════════════════════════════════════════════
// BENTO — row-based, no nth-child tricks
// ══════════════════════════════════════════════════════════
var MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function fmtDate(ts) {
  var d = new Date(ts || Date.now());
  return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' · ' +
    (d.getHours()   < 10 ? '0' : '') + d.getHours()   + ':' +
    (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
}

function renderList() {
  var el = document.getElementById('bento');
  var ct = document.getElementById('note-count');
  var sorted = notes.slice().sort(function(a,b){ return (b.updatedAt||0)-(a.updatedAt||0); });

  ct.textContent = notes.length + (notes.length === 1 ? ' nota' : ' notas');

  if (sorted.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✏</div><div class="empty-text">Nenhuma nota ainda</div></div>';
    return;
  }

  el.innerHTML = '';

  // Build row pattern:
  //   index 0        → wide row (1 card)
  //   index 1,2      → pair row (2 cards)
  //   index 3,4      → pair row (2 cards)
  //   index 5        → wide row
  //   index 6,7      → pair row … repeat
  var i = 0;
  while (i < sorted.length) {
    var isWide = (i === 0) || (i % 5 === 0);
    var row = document.createElement('div');
    row.className = 'bento-row';

    if (isWide) {
      row.appendChild(makeCard(sorted[i], true));
      i++;
    } else {
      row.appendChild(makeCard(sorted[i], false));
      i++;
      if (i < sorted.length) {
        row.appendChild(makeCard(sorted[i], false));
        i++;
      }
    }

    el.appendChild(row);
  }
}

function makeCard(n, wide) {
  var card = document.createElement('div');
  card.className = wide ? 'note-card wide' : 'note-card';
  card.setAttribute('data-id', n.id);

  var title = n.title || 'Sem título';
  var preview = (n.body || '').replace(/\n+/g,' ').trim() || '—';
  var maxPrev = wide ? 120 : 55;
  if (preview.length > maxPrev) preview = preview.slice(0, maxPrev) + '…';

  card.innerHTML =
    '<div class="note-card-title">' + esc(title) + '</div>' +
    '<div class="note-card-preview">' + esc(preview) + '</div>' +
    '<div class="note-card-date">' + fmtDate(n.updatedAt || n.createdAt) + '</div>';

  card.addEventListener('click', function() { openNote(this.getAttribute('data-id')); });
  return card;
}

// ══════════════════════════════════════════════════════════
// EDITOR
// ══════════════════════════════════════════════════════════
function openNote(id) {
  var n = findNote(id);
  if (!n) return;
  curId = id;
  document.getElementById('ed-title').value = n.title || '';
  document.getElementById('ed-body').value   = n.body  || '';
  document.getElementById('btn-del').className = 'ebtn del on';
  dotOff();
  showEditor();
}

function newNote() {
  curId = null;
  document.getElementById('ed-title').value = '';
  document.getElementById('ed-body').value   = '';
  document.getElementById('btn-del').className = 'ebtn del';
  dotOff();
  showEditor();
  if (!physKb) {
    setTimeout(function(){ document.getElementById('ed-title').focus(); }, 250);
  }
}

function showEditor() {
  document.getElementById('editor').className = 'editor-screen open';
  document.body.style.overflow = 'hidden';
}

function closeEditor() {
  autoSaveNow();
  document.getElementById('editor').className = 'editor-screen';
  document.body.style.overflow = '';
  curId = null;
  renderList();
}

function saveNote() {
  var title = document.getElementById('ed-title').value.trim();
  var body  = document.getElementById('ed-body').value;
  if (!title && !body.trim()) { toast('Nota vazia'); return; }

  var now = Date.now();
  if (curId) {
    var n = findNote(curId);
    if (n) { n.title = title; n.body = body; n.updatedAt = now; }
    else   { notes.push({ id: curId, title: title, body: body, createdAt: now, updatedAt: now }); }
  } else {
    var nn = { id: genId(), title: title, body: body, createdAt: now, updatedAt: now };
    notes.push(nn);
    curId = nn.id;
    document.getElementById('btn-del').className = 'ebtn del on';
  }
  if (persist()) dotOn();
}

function autoSaveNow() {
  var title = document.getElementById('ed-title').value.trim();
  var body  = document.getElementById('ed-body').value;
  if (title || body.trim()) saveNote();
}

// ── auto-save on typing ───────────────────────────────────
document.getElementById('ed-title').addEventListener('input', function() {
  clearTimeout(asTimer); asTimer = setTimeout(autoSaveNow, 1500);
});
document.getElementById('ed-body').addEventListener('input', function() {
  clearTimeout(asTimer); asTimer = setTimeout(autoSaveNow, 1500);
});

// ══════════════════════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════════════════════
function openDelete()  { document.getElementById('del-overlay').className = 'overlay on'; }
function closeDelete() { document.getElementById('del-overlay').className = 'overlay'; }
function doDelete() {
  closeDelete();
  if (!curId) return;
  for (var i = 0; i < notes.length; i++) {
    if (notes[i].id === curId) { notes.splice(i,1); break; }
  }
  persist();
  document.getElementById('editor').className = 'editor-screen';
  document.body.style.overflow = '';
  curId = null;
  renderList();
  toast('Nota apagada');
}

// ══════════════════════════════════════════════════════════
// SNAPSHOT — save & restore
// ══════════════════════════════════════════════════════════
function buildSnapshot() {
  return JSON.stringify({
    version: 2,
    app: 'bloco',
    exported: new Date().toISOString(),
    count: notes.length,
    notes: notes
  }, null, 2);
}

function openSnapshot() {
  var sub = document.getElementById('snap-sub');
  sub.textContent = notes.length + ' nota(s) · ' + new Date().toLocaleDateString('pt-BR');
  document.getElementById('restore-area').className = 'restore-area';
  document.getElementById('restore-ta').value = '';
  document.getElementById('snap-overlay').className = 'overlay on';
}
function closeSnapshot() {
  document.getElementById('snap-overlay').className = 'overlay';
}

function toggleRestoreArea() {
  var ra = document.getElementById('restore-area');
  ra.className = ra.className === 'restore-area' ? 'restore-area on' : 'restore-area';
}

function doSave() {
  var json = buildSnapshot();
  var d    = new Date();
  var fname = 'bloco_' +
    d.getFullYear() + '-' +
    (d.getMonth()+1 < 10 ? '0' : '') + (d.getMonth()+1) + '-' +
    (d.getDate()    < 10 ? '0' : '') + d.getDate() + '.json';

  // Modern browsers: Blob + <a download>
  try {
    var blob = new Blob([json], { type: 'application/json' });
    var url  = (window.URL || window.webkitURL).createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fname;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ document.body.removeChild(a); (window.URL||window.webkitURL).revokeObjectURL(url); }, 500);
    closeSnapshot();
    toast('Snapshot salvo: ' + fname);
    return;
  } catch(e) {}

  // iOS fallback: open data URI in new tab (user can share/save from there)
  try {
    var uri = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
    window.open(uri, '_blank');
    closeSnapshot();
    toast('Aberto em nova aba — compartilhe para salvar');
    return;
  } catch(e2) {}

  // Last resort: show in textarea to copy
  document.getElementById('restore-area').className = 'restore-area on';
  document.getElementById('restore-ta').value = json;
  toast('Copie o conteúdo abaixo');
}

function pickFile() {
  document.getElementById('restore-file').click();
}

function readFile(ev) {
  var file = ev.target.files && ev.target.files[0];
  if (!file) return;
  if (typeof FileReader === 'undefined') {
    toast('FileReader não suportado neste browser');
    return;
  }
  var fr = new FileReader();
  fr.onload = function(e) {
    document.getElementById('restore-ta').value = e.target.result;
    document.getElementById('restore-area').className = 'restore-area on';
  };
  fr.readAsText(file);
  // reset so same file can be picked again
  ev.target.value = '';
}

function doRestore() {
  var raw = document.getElementById('restore-ta').value.trim();
  if (!raw) { toast('Nenhum conteúdo para restaurar'); return; }

  try {
    var data = JSON.parse(raw);
    var imported;

    if (Array.isArray(data)) {
      imported = data; // plain array of notes
    } else if (data.notes && Array.isArray(data.notes)) {
      imported = data.notes; // snapshot format
    } else {
      toast('Formato inválido');
      return;
    }

    // Validate each note has at least an id
    var clean = [];
    for (var i = 0; i < imported.length; i++) {
      var n = imported[i];
      if (n && typeof n === 'object') {
        clean.push({
          id:        n.id        || genId(),
          title:     n.title     || '',
          body:      n.body      || '',
          createdAt: n.createdAt || Date.now(),
          updatedAt: n.updatedAt || Date.now()
        });
      }
    }

    notes = clean;
    if (persist()) {
      closeSnapshot();
      renderList();
      toast(clean.length + ' nota(s) restaurada(s)');
    }
  } catch(e) {
    toast('JSON inválido — verifique o conteúdo');
  }
}

// ── 30s silent backup to KEY_B ────────────────────────────
setInterval(function() {
  if (!LS || notes.length === 0) return;
  try { localStorage.setItem(KEY_B, JSON.stringify(notes)); } catch(e) {}
}, 30000);

// ══════════════════════════════════════════════════════════
// PHYSICAL KEYBOARD
// ══════════════════════════════════════════════════════════
var physKb = false;
var lastTouch = 0;

document.addEventListener('touchstart', function() { lastTouch = Date.now(); }, true);

document.addEventListener('keydown', function(e) {
  if (e.key && e.key.length === 1 && (Date.now() - lastTouch) > 600) {
    if (!physKb) {
      physKb = true;
      document.getElementById('kb-badge').className = 'kb-badge on';
    }
  }
  if (e.keyCode === 27) closeEditor();
  if ((e.metaKey || e.ctrlKey) && e.keyCode === 83) { e.preventDefault(); saveNote(); }
}, true);

function resetToVirtual(el) {
  el.removeAttribute('inputmode');
  physKb = false;
  document.getElementById('kb-badge').className = 'kb-badge';
}

var etitle = document.getElementById('ed-title');
var ebody  = document.getElementById('ed-body');

etitle.addEventListener('focus', function() {
  if (physKb) etitle.setAttribute('inputmode','none');
});
ebody.addEventListener('focus', function() {
  if (physKb) ebody.setAttribute('inputmode','none');
});
etitle.addEventListener('touchstart', function() { resetToVirtual(etitle); });
ebody.addEventListener('touchstart',  function() { resetToVirtual(ebody);  });

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function findNote(id) {
  for (var i = 0; i < notes.length; i++) { if (notes[i].id === id) return notes[i]; }
  return null;
}
function dotOn() {
  var d = document.getElementById('saved-dot');
  d.className = 'saved-dot on';
  clearTimeout(d._t);
  d._t = setTimeout(function(){ d.className = 'saved-dot'; }, 2200);
}
function dotOff() { document.getElementById('saved-dot').className = 'saved-dot'; }

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className = 'toast'; }, 2600);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function stopProp(e) { e.stopPropagation(); }

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
if (!LS) toast('Modo privado — use snapshot para guardar');
renderList();
</script>
