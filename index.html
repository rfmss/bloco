<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- iOS: fullscreen sem barra do Safari quando adicionado à tela inicial -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="bloco">
<!-- Android Chrome: esconde UI do browser -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8fb3ae">
<link rel="manifest" href="manifest.json">
<!-- iOS: apple-touch-icon-precomposed prevents Safari from adding gloss -->
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<title>bloco</title>
<style>
*, *:before, *:after {
  -webkit-box-sizing: border-box;
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  height: 100%;
  background: #b2c9c3;
  color: #2a2a2a;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 17px;
  line-height: 1.6;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

/* ── Standalone mode: compensate for translucent status bar ── */
@media all and (display-mode: standalone) {
  .header { padding-top: 40px; }
}
/* iOS Safari added-to-homescreen: navigator.standalone = true */
body.standalone .header { padding-top: 40px; }

/* ── Header ── */
.header {
  padding: 22px 14px 10px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
}
.header-left {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: baseline;
  align-items: baseline;
}
.header-title {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.8px;
  line-height: 1;
  margin-right: 10px;
}
.header-count {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #4a5e58;
}
.header-actions {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
}
.header-actions > * + * { margin-left: 6px; }

.kb-badge {
  display: none;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  background: rgba(0,0,0,0.12);
  border-radius: 20px;
  padding: 4px 10px;
  color: #2a2a2a;
}
.kb-badge.on { display: inline-block; }

.hbtn {
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(0,0,0,0.12);
  border: none;
  border-radius: 20px;
  padding: 6px 12px;
  color: #2a2a2a;
  display: -webkit-inline-flex; display: inline-flex;
  -webkit-align-items: center; align-items: center;
  cursor: pointer;
}
.hbtn:active { opacity: 0.7; }
.hbtn.dark {
  background: #2a2a2a;
  color: #f0ece4;
}

/* ── Bento — responsivo, calculado por JS ── */
.bento {
  padding: 4px 14px 130px;
}
.bento-row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-orient: horizontal;
  -webkit-flex-direction: row;
  flex-direction: row;
  margin-bottom: 10px;
}
.bento-row > * + * { margin-left: 10px; }

/* Card base — dimensões definidas por JS (width e height via style) */
.note-card {
  background: #f0ece4;
  border-radius: 14px;
  padding: 14px 14px 11px;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  overflow: hidden;
  -webkit-transition: -webkit-transform 0.14s;
  transition: transform 0.14s;
  position: relative;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-orient: vertical;
  -webkit-flex-direction: column;
  flex-direction: column;
  /* fallback mínimo caso JS não rode */
  min-height: 120px;
}
.note-card:active {
  -webkit-transform: scale(0.97);
  transform: scale(0.97);
}

.note-card-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 15px;
  font-weight: 700;
  color: #2a2a2a;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  -webkit-flex-shrink: 0; flex-shrink: 0;
}
.note-card-preview {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  color: #777;
  line-height: 1.5;
  overflow: hidden;
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
}
.note-card-date {
  font-family: 'Courier New', Courier, monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #bbb;
  margin-top: 8px;
  -webkit-flex-shrink: 0; flex-shrink: 0;
}

/* ── Empty ── */
.empty {
  text-align: center;
  padding: 80px 32px;
}
.empty-icon { font-size: 42px; margin-bottom: 14px; opacity: 0.3; }
.empty-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #555;
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 28px; right: 18px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #2a2a2a;
  color: #fff;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(0,0,0,0.28);
  z-index: 50;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  -webkit-transition: -webkit-transform 0.12s;
  transition: transform 0.12s;
}
.fab:active { -webkit-transform: scale(0.90); transform: scale(0.90); }

/* ── Editor ── */
.editor-screen {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #f0ece4;
  z-index: 100;
  -webkit-flex-direction: column;
  flex-direction: column;
}
.editor-screen.open { display: -webkit-flex; display: flex; }

.editor-bar {
  background: #f0ece4;
  border-bottom: 1px solid rgba(0,0,0,0.09);
  padding: 12px 14px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.ebtn {
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: none;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  padding: 7px 13px;
  cursor: pointer;
  color: #2a2a2a;
  display: -webkit-inline-flex; display: inline-flex;
  -webkit-align-items: center; align-items: center;
}
.ebtn:active { opacity: 0.6; }
.ebtn.del { color: #c0392b; border-color: rgba(192,57,43,0.28); display: none; }
.ebtn.del.on { display: block; }
.ebtn.save { background: #2a2a2a; color: #fff; border-color: #2a2a2a; }

.editor-bar-right {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
}
.editor-bar-right > * + * { margin-left: 8px; }

.saved-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #5a9e50;
  opacity: 0;
  display: inline-block;
  -webkit-transition: opacity 0.3s;
  transition: opacity 0.3s;
}
.saved-dot.on { opacity: 1; }

.editor-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 22px;
  font-weight: 700;
  color: #2a2a2a;
  border: none; outline: none;
  background: transparent;
  padding: 16px 18px 8px;
  width: 100%;
  -webkit-flex-shrink: 0; flex-shrink: 0;
  letter-spacing: -0.3px;
  -webkit-appearance: none;
  border-radius: 0;
}
.editor-title::-webkit-input-placeholder { color: #ccc; font-weight: 400; }

.editor-body {
  font-family: 'Courier New', Courier, monospace;
  font-size: 15px;
  color: #2a2a2a;
  border: none; outline: none;
  background: transparent;
  padding: 8px 18px 40px;
  width: 100%;
  -webkit-flex: 1; flex: 1;
  resize: none;
  line-height: 1.8;
  -webkit-overflow-scrolling: touch;
  overflow-y: auto;
  -webkit-appearance: none;
  border-radius: 0;
}
.editor-body::-webkit-input-placeholder { color: #ccc; }

/* ── Versions ── */
#ed-versions { padding: 8px 18px 28px; }
.ver-label {
  font-size: 10px;
  color: #bbb;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 5px;
  font-family: 'Courier New', Courier, monospace;
}
.ver-row {
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  gap: 10px;
  padding: 3px 0;
  border-bottom: 1px solid #f2f2f2;
}
.ver-row:last-child { border-bottom: none; }
.ver-hash {
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  color: #8fb3ae;
  -webkit-flex-shrink: 0; flex-shrink: 0;
  letter-spacing: 0.04em;
}
.ver-dt {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  color: #aaa;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 90px; left: 50%;
  -webkit-transform: translateX(-50%) translateY(18px);
  transform: translateX(-50%) translateY(18px);
  background: #2a2a2a;
  color: #fff;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 40px;
  opacity: 0;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
  -webkit-transition: opacity 0.2s, -webkit-transform 0.2s;
  transition: opacity 0.2s, transform 0.2s;
}
.toast.on {
  opacity: 1;
  -webkit-transform: translateX(-50%) translateY(0);
  transform: translateX(-50%) translateY(0);
}

/* ── Sheet (delete confirm + snapshot menu) ── */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.42);
  z-index: 200;
  -webkit-align-items: flex-end; align-items: flex-end;
  -webkit-justify-content: center; justify-content: center;
}
.overlay.on { display: -webkit-flex; display: flex; }
.sheet {
  background: #f0ece4;
  border-radius: 18px 18px 0 0;
  padding: 22px 18px 40px;
  width: 100%;
}
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.sheet-sub {
  font-family: 'Courier New', monospace;
  font-size: 11px; color: #888;
  letter-spacing: 0.06em;
  margin-bottom: 20px;
}
.sheet-btns {
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
}
.sheet-btns > * + * { margin-top: 10px; }
.sbtn {
  border-radius: 11px; padding: 14px;
  font-family: 'Courier New', monospace;
  font-size: 12px; letter-spacing: 0.12em;
  text-transform: uppercase; cursor: pointer;
  border: none;
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
}
/* Icon spacing inside all buttons */
.hbtn svg, .ebtn svg, .sbtn svg { margin-right: 6px; -webkit-flex-shrink: 0; flex-shrink: 0; }
/* upload label acts like sbtn */
.upload-label svg { margin-right: 6px; }
.sbtn:active { opacity: 0.75; }
.sbtn.primary { background: #2a2a2a; color: #fff; }
.sbtn.danger   { background: #c0392b; color: #fff; }
.sbtn.ghost    { background: none; border: 1px solid rgba(0,0,0,0.14); color: #2a2a2a; }

/* ── Upload label (acts as button + file input wrapper) ── */
.upload-label {
  display: block;
  position: relative;
  text-align: center;
  margin-bottom: 4px;
  overflow: hidden;
}
/* ── Restore textarea ── */
.restore-ta {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  border: 1px solid rgba(0,0,0,0.14);
  border-radius: 10px;
  padding: 10px;
  width: 100%;
  height: 120px;
  resize: none;
  -webkit-overflow-scrolling: touch;
  background: #fff;
  margin-bottom: 10px;
  line-height: 1.5;
  display: block;
}
</style>
</head>
<body>

<!-- LIST -->
<div id="list-screen">
  <div class="header">
    <div class="header-left">
      <div class="header-title">bloco</div>
      <div class="header-count" id="note-count">0 notas</div>
    </div>
    <div class="header-actions">
      <div class="kb-badge" id="kb-badge">⌨ físico</div>
      <button class="hbtn dark" onclick="openSnapshot()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="13" height="13" fill="currentColor"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0Zm-101.66,5.66a8,8,0,0,0,11.32,0l48-48a8,8,0,0,0-11.32-11.32L136,124.69V32a8,8,0,0,0-16,0v92.69L85.66,90.34A8,8,0,0,0,74.34,101.66Z"/></svg>salvar tudo</button>
    </div>
  </div>
  <div class="bento" id="bento"></div>
  <button class="fab" onclick="newNote()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="26" height="26" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"/></svg></button>
</div>

<!-- EDITOR -->
<div class="editor-screen" id="editor">
  <div class="editor-bar">
    <button class="ebtn" onclick="closeEditor()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="13" height="13" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/></svg>voltar</button>
    <div class="editor-bar-right">
      <span class="saved-dot" id="saved-dot"></span>
      <button class="ebtn del" id="btn-del" onclick="openDelete()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="13" height="13" fill="currentColor"><path d="M216,48H176V40a24,24,0,0,0-24-24H104A24,24,0,0,0,80,40v8H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM112,40a8,8,0,0,1,8-8h16a8,8,0,0,1,8,8v8H112Zm80,168H64V64H192ZM112,104v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Zm48,0v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Z"/></svg>apagar</button>
      <button class="ebtn save" onclick="saveNote()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="13" height="13" fill="currentColor"><path d="M219.31,72,184,36.69A15.86,15.86,0,0,0,172.69,32H48A16,16,0,0,0,32,48V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V83.31A15.86,15.86,0,0,0,219.31,72ZM168,208H88V168h80Zm40,0H184V160a8,8,0,0,0-8-8H80a8,8,0,0,0-8,8v48H48V48H168v40a8,8,0,0,0,8,8h40ZM176,80H168V48h8Z"/></svg>salvar</button>
    </div>
  </div>
  <input  class="editor-title" id="ed-title" type="text"
    placeholder="Título" autocomplete="off"
    autocorrect="on" autocapitalize="sentences">
  <textarea class="editor-body" id="ed-body"
    placeholder="Escreva aqui..."
    autocorrect="on" autocapitalize="sentences"></textarea>
  <div id="ed-versions"></div>
</div>

<!-- DELETE SHEET -->
<div class="overlay" id="del-overlay" onclick="closeDelete()">
  <div class="sheet" onclick="stopProp(event)">
    <div class="sheet-title">Apagar nota?</div>
    <div class="sheet-sub">Não pode ser desfeito.</div>
    <div class="sheet-btns">
      <button class="sbtn danger" onclick="doDelete()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M216,48H176V40a24,24,0,0,0-24-24H104A24,24,0,0,0,80,40v8H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM112,40a8,8,0,0,1,8-8h16a8,8,0,0,1,8,8v8H112Zm80,168H64V64H192ZM112,104v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Zm48,0v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Z"/></svg>Apagar</button>
      <button class="sbtn ghost"  onclick="closeDelete()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>Cancelar</button>
    </div>
  </div>
</div>

<!-- SNAPSHOT SHEET -->
<div class="overlay" id="snap-overlay" onclick="closeSnapshot()">
  <div class="sheet" onclick="stopProp(event)">
    <div class="sheet-title">Guardar tudo</div>
    <div class="sheet-sub" id="snap-sub">salva um arquivo com todas as suas notas</div>

    <!-- view: main actions -->
    <div id="snap-main">
      <div class="sheet-btns">
        <button class="sbtn primary" onclick="doDownload()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0Zm-101.66,5.66a8,8,0,0,0,11.32,0l48-48a8,8,0,0,0-11.32-11.32L136,124.69V32a8,8,0,0,0-16,0v92.69L85.66,90.34A8,8,0,0,0,74.34,101.66Z"/></svg>guardar tudo agora</button>
        <button class="sbtn ghost"   onclick="showUpload()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0ZM93.66,77.66,120,51.31V152a8,8,0,0,0,16,0V51.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,77.66Z"/></svg>abrir backup salvo</button>
        <button class="sbtn ghost"   onclick="closeSnapshot()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>Fechar</button>
      </div>
    </div>

    <!-- view: upload / restore -->
    <div id="snap-upload" style="display:none">
      <!-- iOS copy hint (shown when download triggered on iOS < 13) -->
      <div id="ios-copy-hint" style="display:none;font-family:'Courier New',monospace;font-size:11px;color:#666;letter-spacing:.06em;margin-bottom:10px;line-height:1.5;">
        iOS não baixa arquivos diretamente.<br>
        Selecione tudo abaixo e copie para salvar.
      </div>
      <button id="ios-copy-btn" class="sbtn primary" style="display:none;margin-bottom:10px;" onclick="copyJSON()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>Copiar tudo</button>

      <!-- real file input, visible and tappable -->
      <label class="sbtn ghost upload-label" id="upload-label">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M213.66,82.34l-56-56A8,8,0,0,0,152,24H56A16,16,0,0,0,40,40V216a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V88A8,8,0,0,0,213.66,82.34ZM160,51.31,188.69,80H160ZM200,216H56V40h88V88a8,8,0,0,0,8,8h48V216Zm-45.66-77.66-24-24a8,8,0,0,0-11.32,0l-24,24a8,8,0,0,0,11.32,11.32L120,137.37V184a8,8,0,0,0,16,0V137.37l13.66,13.63A8,8,0,0,0,161,140.29,8.07,8.07,0,0,0,154.34,138.34Z"/></svg>Escolher arquivo .json
        <input type="file" id="restore-file" accept=".json,.txt,.md"
          style="position:absolute;opacity:0;top:0;left:0;width:100%;height:100%;cursor:pointer"
          onchange="readFile(event)">
      </label>
      <!-- paste fallback -->
      <div style="margin:12px 0 6px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#888;">
        ou cole o JSON abaixo
      </div>
      <textarea id="restore-ta" class="restore-ta"
        placeholder="cole o conteúdo do snapshot aqui..."></textarea>
      <div class="sheet-btns">
        <button class="sbtn primary" onclick="doRestore()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M231.11,40.09a8,8,0,0,0-8.56,1.73L212.67,51.7A96,96,0,1,0,224,128a8,8,0,0,0-16,0A80,80,0,1,1,198.44,69.17L189.66,78A8,8,0,0,0,195.31,92H224a8,8,0,0,0,8-8V56A8,8,0,0,0,231.11,40.09Z"/></svg>Restaurar agora</button>
        <button class="sbtn ghost"   onclick="showMain()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/></svg>Voltar</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════════
var KEY_A = 'bloco_v2_a';
var KEY_B = 'bloco_v2_b';

function lsOk() {
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }
  catch(e) { return false; }
}
var LS = lsOk();

function loadNotes() {
  if (!LS) return [];
  try {
    var r = localStorage.getItem(KEY_A) || localStorage.getItem(KEY_B);
    if (!r) return [];
    var p = JSON.parse(r);
    return Array.isArray(p) ? p : [];
  } catch(e) {
    try {
      var r2 = localStorage.getItem(KEY_B);
      var p2 = JSON.parse(r2 || '[]');
      return Array.isArray(p2) ? p2 : [];
    } catch(e2) { return []; }
  }
}

function persist() {
  if (!LS) return false;
  try {
    var j = JSON.stringify(notes);
    localStorage.setItem(KEY_A, j);
    try { localStorage.setItem(KEY_B, j); } catch(e) {}
    return true;
  } catch(e) {
    try { localStorage.removeItem(KEY_B); localStorage.setItem(KEY_A, JSON.stringify(notes)); return true; }
    catch(e2) { toast('Armazenamento cheio — faça um snapshot'); return false; }
  }
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// djb2 hash → 8-char hex (ES5)
function hashContent(title, body) {
  var s = title + '\n' + body;
  var h = 5381;
  for (var i = 0; i < s.length; i++) {
    h = ((h << 5) + h) ^ s.charCodeAt(i);
    h = h & h;
  }
  var hex = (h >>> 0).toString(16);
  while (hex.length < 8) hex = '0' + hex;
  return hex;
}

function fmtSavedAt(ts) {
  var d = new Date(ts);
  var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
  return pad(d.getDate()) + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear() +
         ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function renderVersions(n) {
  var el = document.getElementById('ed-versions');
  if (!n || !n.versions || n.versions.length === 0) { el.innerHTML = ''; return; }
  var html = '<div class="ver-label">versões</div>';
  var vs = n.versions.slice().reverse();
  for (var i = 0; i < vs.length; i++) {
    html += '<div class="ver-row"><span class="ver-hash">' + vs[i].hash + '</span><span class="ver-dt">' + fmtSavedAt(vs[i].savedAt) + '</span></div>';
  }
  el.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
var notes = loadNotes();
var curId = null;
var asTimer = null;

// ══════════════════════════════════════════════════════════
// BENTO — responsivo: colunas e tamanho calculados por tela
// ══════════════════════════════════════════════════════════
var MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function calcLayout() {
  var w = window.innerWidth || document.documentElement.clientWidth || 320;
  var padH = 28;   // 14px cada lado
  var gap  = 10;
  // Calcula quantas colunas cabem mantendo card mínimo de 150px
  var cols = Math.floor((w - padH + gap) / (150 + gap));
  if (cols < 2) cols = 2;
  if (cols > 4) cols = 4;
  var cardW = Math.floor((w - padH - gap * (cols - 1)) / cols);
  var cardH = Math.floor(cardW * 0.78); // proporção livro de notas
  return { cols: cols, cardW: cardW, cardH: cardH };
}

function fmtDate(ts) {
  var d = new Date(ts || Date.now());
  return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' · ' +
    (d.getHours()   < 10 ? '0' : '') + d.getHours()   + ':' +
    (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
}

function renderList() {
  var el = document.getElementById('bento');
  var ct = document.getElementById('note-count');
  var sorted = notes.slice().sort(function(a,b){ return (b.updatedAt||0)-(a.updatedAt||0); });

  ct.textContent = notes.length + (notes.length === 1 ? ' nota' : ' notas');

  if (sorted.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✏</div><div class="empty-text">Nenhuma nota ainda</div></div>';
    return;
  }

  el.innerHTML = '';

  var layout = calcLayout();
  var i = 0;
  while (i < sorted.length) {
    var row = document.createElement('div');
    row.className = 'bento-row';
    for (var c = 0; c < layout.cols && i < sorted.length; c++) {
      row.appendChild(makeCard(sorted[i], layout));
      i++;
    }
    el.appendChild(row);
  }
}

function makeCard(n, layout) {
  var card = document.createElement('div');
  card.className = 'note-card';
  card.setAttribute('data-id', n.id);
  card.style.width  = layout.cardW + 'px';
  card.style.height = layout.cardH + 'px';

  var title = n.title || 'Sem título';
  var preview = (n.body || '').replace(/\n+/g,' ').trim() || '—';
  var maxPrev = layout.cols >= 3 ? 55 : 80;
  if (preview.length > maxPrev) preview = preview.slice(0, maxPrev) + '…';

  card.innerHTML =
    '<div class="note-card-title">' + esc(title) + '</div>' +
    '<div class="note-card-preview">' + esc(preview) + '</div>' +
    '<div class="note-card-date">' + fmtDate(n.updatedAt || n.createdAt) + '</div>';

  card.addEventListener('click', function() { openNote(this.getAttribute('data-id')); });
  return card;
}

// ══════════════════════════════════════════════════════════
// EDITOR
// ══════════════════════════════════════════════════════════
function openNote(id) {
  var n = findNote(id);
  if (!n) return;
  curId = id;
  document.getElementById('ed-title').value = n.title || '';
  document.getElementById('ed-body').value   = n.body  || '';
  document.getElementById('btn-del').className = 'ebtn del on';
  dotOff();
  renderVersions(n);
  showEditor();
}

function newNote() {
  curId = null;
  document.getElementById('ed-title').value = '';
  document.getElementById('ed-body').value   = '';
  document.getElementById('btn-del').className = 'ebtn del';
  dotOff();
  document.getElementById('ed-versions').innerHTML = '';
  showEditor();
  if (!physKb) {
    setTimeout(function(){ document.getElementById('ed-title').focus(); }, 250);
  }
}

function showEditor() {
  document.getElementById('editor').className = 'editor-screen open';
  document.body.style.overflow = 'hidden';
}

function closeEditor() {
  autoSaveNow();
  document.getElementById('editor').className = 'editor-screen';
  document.body.style.overflow = '';
  curId = null;
  renderList();
}

function saveNote() {
  var title = document.getElementById('ed-title').value.trim();
  var body  = document.getElementById('ed-body').value;
  if (!title && !body.trim()) { toast('Nota vazia'); return; }

  var now = Date.now();
  var hash = hashContent(title, body);
  if (curId) {
    var n = findNote(curId);
    if (n) {
      n.title = title; n.body = body; n.updatedAt = now;
      var vs = n.versions || [];
      if (!vs.length || vs[vs.length-1].hash !== hash) {
        vs.push({ hash: hash, savedAt: now });
      }
      n.versions = vs;
      renderVersions(n);
    } else {
      var newN = { id: curId, title: title, body: body, createdAt: now, updatedAt: now, versions: [{ hash: hash, savedAt: now }] };
      notes.push(newN);
      renderVersions(newN);
    }
  } else {
    var nn = { id: genId(), title: title, body: body, createdAt: now, updatedAt: now, versions: [{ hash: hash, savedAt: now }] };
    notes.push(nn);
    curId = nn.id;
    document.getElementById('btn-del').className = 'ebtn del on';
    renderVersions(nn);
  }
  if (persist()) dotOn();
}

function autoSaveNow() {
  var title = document.getElementById('ed-title').value.trim();
  var body  = document.getElementById('ed-body').value;
  if (title || body.trim()) saveNote();
}

// ── auto-save on typing ───────────────────────────────────
document.getElementById('ed-title').addEventListener('input', function() {
  clearTimeout(asTimer); asTimer = setTimeout(autoSaveNow, 1500);
});
document.getElementById('ed-body').addEventListener('input', function() {
  clearTimeout(asTimer); asTimer = setTimeout(autoSaveNow, 1500);
});

// ══════════════════════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════════════════════
function openDelete()  { document.getElementById('del-overlay').className = 'overlay on'; }
function closeDelete() { document.getElementById('del-overlay').className = 'overlay'; }
function doDelete() {
  closeDelete();
  if (!curId) return;
  for (var i = 0; i < notes.length; i++) {
    if (notes[i].id === curId) { notes.splice(i,1); break; }
  }
  persist();
  document.getElementById('editor').className = 'editor-screen';
  document.body.style.overflow = '';
  curId = null;
  renderList();
  toast('Nota apagada');
}

// ══════════════════════════════════════════════════════════
// SNAPSHOT — download & restore
// ══════════════════════════════════════════════════════════
function buildSnapshot() {
  return JSON.stringify({
    version: 2,
    app: 'bloco',
    exported: new Date().toISOString(),
    count: notes.length,
    notes: notes
  }, null, 2);
}

function snapFilename() {
  var d = new Date();
  return 'bloco_' +
    d.getFullYear() + '-' +
    (d.getMonth()+1 < 10 ? '0' : '') + (d.getMonth()+1) + '-' +
    (d.getDate() < 10 ? '0' : '') + d.getDate() + '.json';
}

function openSnapshot() {
  document.getElementById('snap-sub').textContent =
    notes.length + ' nota(s) · ' + new Date().toLocaleDateString('pt-BR');
  showMain();
  document.getElementById('restore-ta').value = '';
  document.getElementById('snap-overlay').className = 'overlay on';
}
function closeSnapshot() {
  document.getElementById('snap-overlay').className = 'overlay';
}
function showMain() {
  document.getElementById('snap-main').style.display   = 'block';
  document.getElementById('snap-upload').style.display = 'none';
}
function showUpload() {
  document.getElementById('snap-main').style.display   = 'none';
  document.getElementById('snap-upload').style.display = 'block';
}

// ── Detect if browser supports real file download ────────
// iOS Safari < 13 ignores the download attribute entirely
var IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
var IOS_VER = (function() {
  var m = navigator.userAgent.match(/OS (\d+)_/);
  return m ? parseInt(m[1], 10) : 0;
})();
var CAN_DOWNLOAD = !IS_IOS || IOS_VER >= 13;

// ── DOWNLOAD ─────────────────────────────────────────────
function doDownload() {
  var json  = buildSnapshot();
  var fname = snapFilename();

  // Modern browsers + Android + iOS 13+: real file download
  if (CAN_DOWNLOAD && window.Blob && (window.URL || window.webkitURL)) {
    try {
      var blob = new Blob([json], { type: 'application/json' });
      var url  = (window.URL || window.webkitURL).createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = fname; a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      var _u = url;
      setTimeout(function() {
        document.body.removeChild(a);
        (window.URL || window.webkitURL).revokeObjectURL(_u);
      }, 800);
      closeSnapshot();
      toast('⬇ ' + fname);
      return;
    } catch(e) {}
  }

  // iOS < 13: download attribute ignored — show JSON for copy
  // Best the user can do: copy → paste no Notes/Mail/etc.
  showIOSCopy(json, fname);
}

function showIOSCopy(json, fname) {
  // Reuse the upload view but fill with JSON for copying
  document.getElementById('snap-main').style.display   = 'none';
  document.getElementById('snap-upload').style.display = 'block';
  // Update label to indicate copy mode
  document.getElementById('upload-label').style.display = 'none';
  var ta = document.getElementById('restore-ta');
  ta.value = json;
  ta.setAttribute('readonly', 'readonly');
  // Show copy button if not already
  document.getElementById('ios-copy-hint').style.display = 'block';
  document.getElementById('ios-copy-btn').style.display  = 'block';
  toast('Selecione tudo e copie o JSON');
  setTimeout(function() { ta.select(); }, 200);
}

function copyJSON() {
  var ta = document.getElementById('restore-ta');
  ta.select();
  try {
    document.execCommand('copy');
    toast('Copiado! Cole no Notes ou envie por email.');
  } catch(e) {
    toast('Selecione tudo manualmente e copie');
  }
}

function showRestoreMode() {
  var ta = document.getElementById('restore-ta');
  ta.removeAttribute('readonly');
  ta.value = '';
  document.getElementById('upload-label').style.display = '';
  document.getElementById('ios-copy-hint').style.display = 'none';
  document.getElementById('ios-copy-btn').style.display  = 'none';
}

// ── UPLOAD / RESTORE ──────────────────────────────────────
function readFile(ev) {
  var file = ev.target.files && ev.target.files[0];
  if (!file) return;

  if (typeof FileReader === 'undefined') {
    toast('FileReader não disponível — cole o JSON manualmente');
    return;
  }

  var fr = new FileReader();
  fr.onload = function(e) {
    document.getElementById('restore-ta').value = e.target.result;
    toast('Arquivo carregado — toque em Restaurar');
  };
  fr.onerror = function() { toast('Erro ao ler o arquivo'); };
  fr.readAsText(file);
  ev.target.value = ''; // allow picking same file again
}

function doRestore() {
  var raw = document.getElementById('restore-ta').value.trim();
  if (!raw) { toast('Nenhum conteúdo — escolha um arquivo ou cole o JSON'); return; }

  var data, imported;
  try {
    data = JSON.parse(raw);
  } catch(e) {
    toast('JSON inválido — verifique o conteúdo');
    return;
  }

  if (Array.isArray(data)) {
    imported = data;
  } else if (data && Array.isArray(data.notes)) {
    imported = data.notes;
  } else {
    toast('Formato não reconhecido');
    return;
  }

  var clean = [];
  var now   = Date.now();
  for (var i = 0; i < imported.length; i++) {
    var n = imported[i];
    if (n && typeof n === 'object') {
      clean.push({
        id:        n.id        || genId(),
        title:     String(n.title || ''),
        body:      String(n.body  || ''),
        createdAt: n.createdAt || now,
        updatedAt: n.updatedAt || now
      });
    }
  }

  notes = clean;
  if (persist()) {
    closeSnapshot();
    renderList();
    toast(clean.length + ' nota(s) restaurada(s)');
  }
}

// ── 30s silent backup to KEY_B ────────────────────────────
setInterval(function() {
  if (!LS || notes.length === 0) return;
  try { localStorage.setItem(KEY_B, JSON.stringify(notes)); } catch(e) {}
}, 30000);

// ══════════════════════════════════════════════════════════
// PHYSICAL KEYBOARD
// ══════════════════════════════════════════════════════════
var physKb = false;
var lastTouch = 0;

document.addEventListener('touchstart', function() { lastTouch = Date.now(); }, true);

document.addEventListener('keydown', function(e) {
  if (e.key && e.key.length === 1 && (Date.now() - lastTouch) > 600) {
    if (!physKb) {
      physKb = true;
      document.getElementById('kb-badge').className = 'kb-badge on';
    }
  }
  if (e.keyCode === 27) closeEditor();
  if ((e.metaKey || e.ctrlKey) && e.keyCode === 83) { e.preventDefault(); saveNote(); }
}, true);

function resetToVirtual(el) {
  el.removeAttribute('inputmode');
  physKb = false;
  document.getElementById('kb-badge').className = 'kb-badge';
}

var etitle = document.getElementById('ed-title');
var ebody  = document.getElementById('ed-body');

etitle.addEventListener('focus', function() {
  if (physKb) etitle.setAttribute('inputmode','none');
});
ebody.addEventListener('focus', function() {
  if (physKb) ebody.setAttribute('inputmode','none');
});
etitle.addEventListener('touchstart', function() { resetToVirtual(etitle); });
ebody.addEventListener('touchstart',  function() { resetToVirtual(ebody);  });

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function findNote(id) {
  for (var i = 0; i < notes.length; i++) { if (notes[i].id === id) return notes[i]; }
  return null;
}
function dotOn() {
  var d = document.getElementById('saved-dot');
  d.className = 'saved-dot on';
  clearTimeout(d._t);
  d._t = setTimeout(function(){ d.className = 'saved-dot'; }, 2200);
}
function dotOff() { document.getElementById('saved-dot').className = 'saved-dot'; }

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className = 'toast'; }, 2600);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function stopProp(e) { e.stopPropagation(); }

// ══════════════════════════════════════════════════════════
// STANDALONE (added to homescreen — hide browser chrome)
// ══════════════════════════════════════════════════════════
if (window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches) {
  document.body.className = (document.body.className + ' standalone').trim();
}

// ══════════════════════════════════════════════════════════
// RESPONSIVE — re-renderiza ao mudar orientação
// ══════════════════════════════════════════════════════════
window.addEventListener('orientationchange', function() {
  setTimeout(renderList, 300);
}, false);
window.addEventListener('resize', function() {
  clearTimeout(window._resizeT);
  window._resizeT = setTimeout(renderList, 200);
}, false);

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
if (!LS) toast('Modo privado — use "salvar tudo" para guardar');
renderList();
</script>
</body>
</html>
